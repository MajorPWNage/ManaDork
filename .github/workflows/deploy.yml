name: Deploy ManaDork

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package release
        run: |
          RELEASE_ID="${GITHUB_SHA::7}-$(date +%Y%m%d-%H%M%S)"
          echo "RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"
          tar -czf "manadork-${RELEASE_ID}.tar.gz" dist

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release archive
        run: |
          scp -P "${{ secrets.DEPLOY_PORT }}" \
            "manadork-${RELEASE_ID}.tar.gz" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_REMOTE_INCOMING }}/"

      - name: Activate release on server
        run: |
          ssh -p "${{ secrets.DEPLOY_PORT }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "/usr/local/bin/manadork-activate-release '${RELEASE_ID}' '${{ secrets.DEPLOY_REMOTE_INCOMING }}/manadork-${RELEASE_ID}.tar.gz'"
